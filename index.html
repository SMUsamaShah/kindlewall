<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kindle Wallpaper</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0f0f">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f0f0f;
      --surface: #191919;
      --border:  #262626;
      --text:    #dedad5;
      --muted:   #484848;
      --accent:  #6b9cf8;
      --paper:   #e8e4df;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body > header {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
      padding: 20px 0 0;
    }

    .section {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 400px;
      padding: 18px 20px 32px;
      gap: 18px;
    }
    .section.active { display: flex; }

    .tabs {
      display: flex;
      background: var(--surface);
      border-radius: 9px;
      padding: 3px;
      gap: 3px;
    }
    .tab {
      background: none;
      border: none;
      border-radius: 7px;
      padding: 8px 22px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      font-weight: 500;
      font-family: inherit;
      transition: background 0.14s, color 0.14s;
    }
    .tab.active {
      background: var(--bg);
      color: var(--text);
      box-shadow: 0 1px 3px rgba(0,0,0,.5);
    }

    #dropzone {
      width: 100%;
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 56px 24px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.14s, background 0.12s;
    }
    #dropzone.over { border-color: #444; background: var(--surface); }
    #dropzone p { font-size: 15px; color: #555; line-height: 1.75; }
    #dropzone code {
      display: block;
      margin-top: 10px;
      font-size: 10px;
      font-family: 'SF Mono', 'Consolas', monospace;
      color: #2e2e2e;
      letter-spacing: 0.05em;
    }

    .hint { font-size: 11px; color: var(--muted); letter-spacing: 0.02em; }
    .crop-wrap {
      width: 100%;
      height: 62dvh;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
    }
    #crop-img { display: block; max-width: 100%; }

    .device {
      background: #1d1d1d;
      border-radius: 14px;
      padding: 12px 12px 28px;
      box-shadow: 0 0 0 1px #2c2c2c, 0 20px 60px rgba(0,0,0,.7);
      position: relative;
    }
    .device::after {
      content: 'kindle';
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 8px;
      letter-spacing: 0.2em;
      color: #333;
    }
    .screen {
      width: 210px;
      height: 284px;
      background: var(--paper);
      overflow: hidden;
      border-radius: 2px;
    }
    .screen img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .filter-row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      width: 100%;
      padding-bottom: 4px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      flex-shrink: 0;
      user-select: none;
    }
    .filter-item canvas {
      border-radius: 3px;
      border: 2px solid transparent;
      transition: border-color 0.12s;
      display: block;
    }
    .filter-item.sel canvas { border-color: var(--accent); }
    .filter-item span {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .filter-item.sel span { color: var(--accent); }

    /* ── Adjustment sliders ── */
    #adjustments {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .adj-row {
      display: grid;
      grid-template-columns: 76px 1fr 40px;
      align-items: center;
      gap: 8px;
    }
    .adj-row label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .adj-row input[type=range] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .adj-val {
      font-size: 11px;
      color: var(--muted);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .btn-row   { display: flex; gap: 10px; }
    .ghost-row { display: flex; gap: 16px; }

    button {
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      border: none;
      padding: 11px 22px;
      letter-spacing: 0.02em;
    }
    .primary   { background: var(--text); color: var(--bg); }
    .secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .ghost     { background: none; border: none; font-size: 12px; color: var(--muted); padding: 4px 0; font-weight: 400; }
    .ghost:hover { color: var(--text); }

    canvas, input[type=file] { display: none; }
  </style>
</head>
<body>

<header>Kindle Wallpaper</header>

<div id="sec-drop" class="section active">
  <div class="tabs">
    <button class="tab active" data-mode="auto">Auto Fit</button>
    <button class="tab" data-mode="manual">Manual Crop</button>
  </div>
  <div id="dropzone">
    <p>Drop an image<br>or tap to choose</p>
    <code>1072 × 1448 · grayscale</code>
  </div>
</div>

<div id="sec-crop" class="section">
  <p class="hint">Box is 1072×1448 px — drag to reposition · pinch to zoom image</p>
  <p id="crop-warn" style="font-size:11px;color:#c07040;text-align:center;min-height:1em"></p>
  <div class="crop-wrap">
    <img id="crop-img" alt="">
  </div>
  <div class="btn-row">
    <button class="secondary" id="btn-back-crop">← Back</button>
    <button class="primary"   id="btn-confirm-crop">Use this crop</button>
  </div>
</div>

<div id="sec-filter" class="section">
  <div class="device">
    <div class="screen">
      <img id="preview-img" alt="">
    </div>
  </div>
  <div id="channel-row" class="filter-row"></div>
  <div id="adjustments">
    <div class="adj-row">
      <label for="adj-brightness">Brightness</label>
      <input type="range" id="adj-brightness" min="-100" max="100" value="0" step="1">
      <span class="adj-val" id="val-brightness">0</span>
    </div>
    <div class="adj-row">
      <label for="adj-contrast">Contrast</label>
      <input type="range" id="adj-contrast" min="-100" max="100" value="0" step="1">
      <span class="adj-val" id="val-contrast">0</span>
    </div>
    <div class="adj-row">
      <label for="adj-sharpness">Sharpness</label>
      <input type="range" id="adj-sharpness" min="0" max="200" value="100" step="5">
      <span class="adj-val" id="val-sharpness">1.0×</span>
    </div>
    <div class="adj-row">
      <label for="adj-noise">Noise</label>
      <input type="range" id="adj-noise" min="0" max="200" value="0" step="1">
      <span class="adj-val" id="val-noise">0</span>
    </div>
  </div>
  <div class="btn-row">
    <button class="primary"   id="btn-send">Send to Kindle</button>
    <button class="secondary" id="btn-dl">Download</button>
  </div>
  <div class="ghost-row">
    <button class="ghost" id="btn-recrop" style="display:none">← Re-crop</button>
    <button class="ghost" id="btn-reset">Different image</button>
  </div>
</div>

<canvas id="work-canvas"></canvas>
<input type="file" id="file-input" accept="image/*">

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
<script>
/* ── Constants ── */
const W = 1072, H = 1448;
const PENDING_CACHE = 'kw-pending-v1';
const THUMB_W = 36, THUMB_H = 49;

/* ── Screen filter LUT — level stretch + gentle S-curve
 *
 * Pixel analysis of 5 original Kindle screensaver images (Bruce Ashley, 2011):
 *
 *   Zone 0–15 (pure black):   28–45% of pixels  ← huge, from lighting/shadows
 *   Zone 16–63 (deep shadow): 9–16%
 *   Zone 64–191 (mid-grey):   26–40%             ← texture lives here, NOT crushed
 *   Zone 192–239 (highlight):  6–17%
 *   Zone 240–255 (pure white): 7–20%
 *
 * The blacks come from deep inter-object shadows and dark backgrounds in the
 * original lighting setup — NOT from a sigmoid crushing midtones. The mid-grey
 * range is flat and full of fine texture detail.
 *
 * Correct recipe (revised from initial k=8 sigmoid which was wrong):
 *   1. Dual clarity — macro (25px) for structure shadows, fine (5px) for grain
 *   2. Level stretch: black point 20→0, white point 230→255
 *   3. Gentle S-curve (k=4, 60% weight) blended with linear (40%)
 *   4. Hard final sharpen (1.5px, 1.0) — scaled by Sharpness slider
 */
const SCREEN_LUT = (() => {
  const lut = new Uint8Array(256);
  const BLACK_IN = 20;
  const WHITE_IN = 230;
  const k = 4, mid = 0.5;
  const lo  = 1 / (1 + Math.exp(-k * (0   - mid)));
  const hi  = 1 / (1 + Math.exp(-k * (1   - mid)));
  const rng = hi - lo;
  for (let i = 0; i < 256; i++) {
    if (i <= BLACK_IN) { lut[i] = 0;   continue; }
    if (i >= WHITE_IN) { lut[i] = 255; continue; }
    const t = (i - BLACK_IN) / (WHITE_IN - BLACK_IN);
    const s = ((1 / (1 + Math.exp(-k * (t - mid)))) - lo) / rng;
    lut[i] = Math.round((0.6 * s + 0.4 * t) * 255);
  }
  return lut;
})();

/* ── Channels ──
 *
 * Four greyscale conversions. Replaces the old Screen / Screen R / Screen G / Screen B
 * filter variants — pipeline is identical, only toGrey differs, so a row of thumbnails
 * is cleaner than four FILTERS entries.
 */
const CHANNELS = [
  { id: 'lum', label: 'Lum', fn: (r, g, b) => 0.2126*r + 0.7152*g + 0.0722*b },
  { id: 'r',   label: 'R',   fn: (r)       => r },
  { id: 'g',   label: 'G',   fn: (r, g)    => g },
  { id: 'b',   label: 'B',   fn: (r, g, b) => b },
];

/* ── Screen pipeline config ── */
const SCREEN_PIPELINE = {
  lut: SCREEN_LUT,
  clarityPasses: [
    { radius: '25px', amount: 0.5 }, // macro: pushes inter-object shadows toward black
    { radius: '5px',  amount: 0.4 }, // micro: fine grain/scratch/texture pop
  ],
  unsharpAmount: 1.0, // final edge sharpen — scaled by adjustments.sharpness
};

/* ── Adjustments state ── */
const adjustments = { channel: 'lum', brightness: 0, contrast: 0, sharpness: 100, noise: 0 };
let filteredImageData = null; // grey snapshot after full pipeline, before B/C/N post-pass
let blobGen = 0;              // stale-blob guard: only the latest toBlob() call updates the preview

/* ── Other state ── */
let mode = 'auto';
let cropper = null;
let cropBlobUrl = null;
let originalBlob = null;
let sourceCanvas = null;
let outputBlob = null;
let previewUrl = null;

/* ── Elements ── */
const $ = id => document.getElementById(id);
const workCanvas = $('work-canvas');
const workCtx    = workCanvas.getContext('2d');
const dropzone   = $('dropzone');
const fileInput  = $('file-input');
const cropImg    = $('crop-img');
const channelRow = $('channel-row');
const previewImg = $('preview-img');

workCanvas.width = W; workCanvas.height = H;

/* ── Section switching ── */
function show(name) {
  document.querySelectorAll('.section').forEach(s =>
    s.classList.toggle('active', s.id === `sec-${name}`)
  );
}

/* ── Mode tabs ── */
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
  });
});

/* ── Service worker ── */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(console.error);
}

/* ── Shared image ── */
window.addEventListener('load', async () => {
  if (new URLSearchParams(location.search).get('shared') !== '1') return;
  history.replaceState(null, '', location.pathname);
  try {
    await navigator.serviceWorker.ready;
    const cache = await caches.open(PENDING_CACHE);
    const res = await cache.match('/pending-image');
    if (!res) return;
    const blob = await res.blob();
    await cache.delete('/pending-image');
    // Shared images always go to crop first — framing is unknown when sharing from another app
    originalBlob = blob;
    showCropUI(blob);
  } catch (e) { console.error(e); }
});

/* ── Drop zone ── */
dropzone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleBlob(e.target.files[0]); });
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f?.type.startsWith('image/')) handleBlob(f);
});

/* ── Image entry ── */
function handleBlob(blob) {
  originalBlob = blob;
  if (mode === 'manual') { showCropUI(blob); return; }
  const img = new Image();
  const url = URL.createObjectURL(blob);
  img.onload = () => { URL.revokeObjectURL(url); autoFit(img); };
  img.onerror = () => URL.revokeObjectURL(url);
  img.src = url;
}

/* ── Auto fit ── */
function autoFit(img) {
  sourceCanvas = document.createElement('canvas');
  sourceCanvas.width = W; sourceCanvas.height = H;
  const ctx = sourceCanvas.getContext('2d');
  const scale = Math.max(W / img.width, H / img.height);
  const w = img.width * scale, h = img.height * scale;
  ctx.drawImage(img, (W-w)/2, (H-h)/2, w, h);
  setupFilters();
}

/* ── Manual crop ── */
function showCropUI(blob) {
  if (cropper) { cropper.destroy(); cropper = null; }
  if (cropBlobUrl) URL.revokeObjectURL(cropBlobUrl);
  cropBlobUrl = URL.createObjectURL(blob);
  $('crop-warn').textContent = '';
  show('crop');
  setTimeout(() => {
    cropImg.onload = () => {
      const nw = cropImg.naturalWidth, nh = cropImg.naturalHeight;
      if (nw < W || nh < H) {
        $('crop-warn').textContent =
          `⚠ Image (${nw}×${nh}) is smaller than ${W}×${H} — output will be upscaled`;
      }
      cropper = new Cropper(cropImg, {
        aspectRatio: W / H,
        viewMode: 1,
        dragMode: 'move',
        guides: false,
        center: false,
        highlight: false,
        background: false,
        movable: true,
        zoomable: true,
        responsive: true,
        restore: false,
        toggleDragModeOnDblclick: false,
        cropBoxResizable: false,
        ready() {
          cropper.setData({
            x: Math.max(0, Math.round((nw - W) / 2)),
            y: Math.max(0, Math.round((nh - H) / 2)),
            width:  Math.min(W, nw),
            height: Math.min(H, nh),
          });
        },
      });
    };
    cropImg.src = cropBlobUrl;
  }, 30);
}

$('btn-back-crop').addEventListener('click', () => {
  if (cropper) { cropper.destroy(); cropper = null; }
  if (cropBlobUrl) { URL.revokeObjectURL(cropBlobUrl); cropBlobUrl = null; }
  cropImg.src = '';
  show('drop');
});

$('btn-confirm-crop').addEventListener('click', () => {
  if (!cropper) return;
  const data = cropper.getData(true);
  sourceCanvas = document.createElement('canvas');
  sourceCanvas.width = W; sourceCanvas.height = H;
  sourceCanvas.getContext('2d').drawImage(
    cropImg,
    data.x, data.y, data.width, data.height,
    0, 0, W, H
  );
  cropper.destroy(); cropper = null;
  if (cropBlobUrl) { URL.revokeObjectURL(cropBlobUrl); cropBlobUrl = null; }
  cropImg.src = '';
  setupFilters();
});

/* ── Filter section ── */
function setupFilters() {
  buildChannelStrip();
  show('filter');
  $('btn-recrop').style.display = '';
  applyFilter();
}

/* ── Channel strip ──
 *
 * Four thumbnails (Lum / R / G / B). Clicking one switches greyscale conversion
 * and re-runs the full pipeline. Thumbnails apply toGrey + LUT inline —
 * clarity passes are skipped at thumb size (imperceptible, expensive).
 */
function buildChannelStrip() {
  const tc = document.createElement('canvas');
  tc.width = THUMB_W; tc.height = THUMB_H;
  tc.getContext('2d').drawImage(sourceCanvas, 0, 0, THUMB_W, THUMB_H);
  const td = tc.getContext('2d').getImageData(0, 0, THUMB_W, THUMB_H);

  channelRow.innerHTML = '';
  for (const ch of CHANNELS) {
    const thumb  = document.createElement('canvas');
    thumb.width  = THUMB_W; thumb.height = THUMB_H;
    const tCtx   = thumb.getContext('2d');
    const result = tCtx.createImageData(THUMB_W, THUMB_H);
    for (let i = 0; i < td.data.length; i += 4) {
      let v = Math.max(0, Math.min(255, Math.round(ch.fn(td.data[i], td.data[i+1], td.data[i+2]))));
      v = SCREEN_LUT[v];
      result.data[i] = result.data[i+1] = result.data[i+2] = v;
      result.data[i+3] = 255;
    }
    tCtx.putImageData(result, 0, 0);

    const item  = document.createElement('div');
    const label = document.createElement('span');
    item.className = 'filter-item' + (ch.id === adjustments.channel ? ' sel' : '');
    label.textContent = ch.label;
    item.append(thumb, label);
    item.addEventListener('click', () => {
      channelRow.querySelectorAll('.filter-item').forEach(i => i.classList.remove('sel'));
      item.classList.add('sel');
      adjustments.channel = ch.id;
      applyFilter();
    });
    channelRow.append(item);
  }
}

/* ── Apply filter (full pipeline) ──
 *
 * Runs on: channel change, sharpness change (debounced 150 ms).
 * Stores grey result as filteredImageData, then calls applyAdjustments().
 *
 * Pipeline: toGrey → clarity passes → LUT → fine sharpen → snapshot
 */
function applyFilter() {
  if (!sourceCanvas) return;
  const ch  = CHANNELS.find(c => c.id === adjustments.channel);
  const src = sourceCanvas.getContext('2d').getImageData(0, 0, W, H);
  const out = workCtx.createImageData(W, H);

  // Step 1: Greyscale conversion
  for (let i = 0; i < src.data.length; i += 4) {
    const v = Math.max(0, Math.min(255, Math.round(ch.fn(src.data[i], src.data[i+1], src.data[i+2]))));
    out.data[i] = out.data[i+1] = out.data[i+2] = v;
    out.data[i+3] = 255;
  }
  workCtx.putImageData(out, 0, 0);

  const steps = [];

  // Step 2: Clarity passes (fixed amounts — local contrast, independent of Sharpness slider)
  for (const pass of SCREEN_PIPELINE.clarityPasses) {
    steps.push(() => unsharpMask(workCanvas, pass.amount, pass.radius));
  }

  // Step 3: Tone curve LUT
  steps.push(() => {
    const d = workCtx.getImageData(0, 0, W, H);
    for (let i = 0; i < d.data.length; i += 4) {
      const v = SCREEN_PIPELINE.lut[d.data[i]];
      d.data[i] = d.data[i+1] = d.data[i+2] = v;
    }
    workCtx.putImageData(d, 0, 0);
  });

  // Step 4: Fine edge sharpening, scaled by Sharpness slider (0–200 → 0×–2×)
  const sharpScale = adjustments.sharpness / 100;
  if (sharpScale > 0) {
    steps.push(() => unsharpMask(workCanvas, SCREEN_PIPELINE.unsharpAmount * sharpScale, '1.5px'));
  }

  // Snapshot grey result, then apply B/C/N post-pass
  steps.reduce((p, fn) => p.then(fn), Promise.resolve()).then(() => {
    filteredImageData = workCtx.getImageData(0, 0, W, H);
    applyAdjustments();
  });
}

/* ── Apply adjustments (fast post-pass) ──
 *
 * Runs on: brightness, contrast, noise slider change.
 * Reads filteredImageData (pipeline output), writes to workCanvas.
 * Does NOT re-run clarity passes or LUT.
 *
 * Contrast formula: factor=(100+c)/100
 *   c=-100 → factor=0 (flat grey), c=0 → factor=1 (no change), c=+100 → factor=2 (double)
 *
 * Noise: re-randomised on each call. A static pre-generated noise layer would
 * stop the grain pattern shifting when brightness/contrast move — deferred for now.
 */
function applyAdjustments() {
  if (!filteredImageData) return;
  const { brightness, contrast, noise } = adjustments;
  const src = filteredImageData.data;
  const out = workCtx.createImageData(W, H);
  const dst = out.data;
  const cf  = (100 + contrast) / 100;

  for (let i = 0; i < src.length; i += 4) {
    let v = src[i];
    if (contrast !== 0) v = (v - 128) * cf + 128;
    v += brightness;
    if (noise > 0) v += (Math.random() * 2 - 1) * noise;
    dst[i] = dst[i+1] = dst[i+2] = Math.max(0, Math.min(255, Math.round(v)));
    dst[i+3] = 255;
  }
  workCtx.putImageData(out, 0, 0);

  // Stale-blob guard: rapid slider moves queue multiple toBlob() calls;
  // only the callback matching the latest gen updates the preview and outputBlob.
  const gen = ++blobGen;
  workCanvas.toBlob(blob => {
    if (gen !== blobGen) return;
    outputBlob = blob;
    if (previewUrl) URL.revokeObjectURL(previewUrl);
    previewUrl = URL.createObjectURL(blob);
    previewImg.src = previewUrl;
  }, 'image/jpeg', 0.92);
}

/* ── Unsharp mask — GPU blur (CSS filter) + per-pixel subtract ──
 * radius: CSS blur value, e.g. '1.5px' (fine sharpen) or '25px' (clarity)
 */
async function unsharpMask(canvas, amount, radius = '1.5px') {
  const { width: w, height: h } = canvas;
  const ctx   = canvas.getContext('2d');
  const blurC = document.createElement('canvas');
  blurC.width = w; blurC.height = h;
  const bCtx  = blurC.getContext('2d');
  bCtx.filter = `blur(${radius})`;
  bCtx.drawImage(canvas, 0, 0);
  const orig    = ctx.getImageData(0, 0, w, h);
  const blurred = bCtx.getImageData(0, 0, w, h);
  for (let i = 0; i < orig.data.length; i += 4) {
    const v = Math.max(0, Math.min(255, orig.data[i] + amount * (orig.data[i] - blurred.data[i])));
    orig.data[i] = orig.data[i+1] = orig.data[i+2] = Math.round(v);
  }
  ctx.putImageData(orig, 0, 0);
}

/* ── Slider wiring ──
 *
 * wireSlider(inputId, adjustmentsKey, displayFmt, fullPipeline)
 *   fullPipeline=true  → debounced applyFilter()     (channel / sharpness)
 *   fullPipeline=false → immediate applyAdjustments() (brightness / contrast / noise)
 */
let filterTimer = null;

function wireSlider(id, key, fmt, fullPipeline) {
  const input = $(id);
  const val   = $(`val-${id.slice(4)}`); // 'adj-brightness' → 'val-brightness'
  input.addEventListener('input', () => {
    adjustments[key] = +input.value;
    val.textContent = fmt(+input.value);
    if (fullPipeline) {
      clearTimeout(filterTimer);
      filterTimer = setTimeout(applyFilter, 150);
    } else {
      applyAdjustments();
    }
  });
}

wireSlider('adj-brightness', 'brightness', v => (v > 0 ? '+' : '') + v,     false);
wireSlider('adj-contrast',   'contrast',   v => (v > 0 ? '+' : '') + v,     false);
wireSlider('adj-sharpness',  'sharpness',  v => (v / 100).toFixed(1) + '×', true);
wireSlider('adj-noise',      'noise',      v => v,                           false);

/* ── Send to Kindle ── */
$('btn-send').addEventListener('click', async () => {
  if (!outputBlob) return;
  const file = new File([outputBlob], 'kindle-wallpaper.jpg', { type: 'image/jpeg' });
  if (navigator.canShare?.({ files: [file] })) {
    try { await navigator.share({ files: [file], title: 'Kindle Wallpaper' }); return; }
    catch (e) { if (e.name === 'AbortError') return; }
  }
  download();
});

$('btn-dl').addEventListener('click', download);
function download() {
  if (!outputBlob) return;
  Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(outputBlob),
    download: 'kindle-wallpaper.jpg'
  }).click();
}

$('btn-recrop').addEventListener('click', () => { if (originalBlob) showCropUI(originalBlob); });

$('btn-reset').addEventListener('click', () => {
  sourceCanvas = null; filteredImageData = null; outputBlob = null; originalBlob = null;
  if (previewUrl) { URL.revokeObjectURL(previewUrl); previewUrl = null; }
  fileInput.value = '';
  Object.assign(adjustments, { channel: 'lum', brightness: 0, contrast: 0, sharpness: 100, noise: 0 });
  $('adj-brightness').value = 0;   $('val-brightness').textContent = '0';
  $('adj-contrast').value   = 0;   $('val-contrast').textContent   = '0';
  $('adj-sharpness').value  = 100; $('val-sharpness').textContent  = '1.0×';
  $('adj-noise').value      = 0;   $('val-noise').textContent      = '0';
  show('drop');
});
</script>
