<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kindle Wallpaper</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0f0f">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f0f0f;
      --surface: #191919;
      --border:  #262626;
      --text:    #dedad5;
      --muted:   #484848;
      --accent:  #6b9cf8;
      --paper:   #e8e4df;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body > header {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
      padding: 20px 0 0;
    }

    .section {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 400px;
      padding: 18px 20px 32px;
      gap: 18px;
    }
    .section.active { display: flex; }

    .tabs {
      display: flex;
      background: var(--surface);
      border-radius: 9px;
      padding: 3px;
      gap: 3px;
    }
    .tab {
      background: none;
      border: none;
      border-radius: 7px;
      padding: 8px 22px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      font-weight: 500;
      font-family: inherit;
      transition: background 0.14s, color 0.14s;
    }
    .tab.active {
      background: var(--bg);
      color: var(--text);
      box-shadow: 0 1px 3px rgba(0,0,0,.5);
    }

    #dropzone {
      width: 100%;
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 56px 24px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.14s, background 0.12s;
    }
    #dropzone.over { border-color: #444; background: var(--surface); }
    #dropzone p { font-size: 15px; color: #555; line-height: 1.75; }
    #dropzone code {
      display: block;
      margin-top: 10px;
      font-size: 10px;
      font-family: 'SF Mono', 'Consolas', monospace;
      color: #2e2e2e;
      letter-spacing: 0.05em;
    }

    .hint { font-size: 11px; color: var(--muted); letter-spacing: 0.02em; }
    .crop-wrap {
      width: 100%;
      height: 62dvh;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
    }
    #crop-img { display: block; max-width: 100%; }

    .device {
      background: #1d1d1d;
      border-radius: 14px;
      padding: 12px 12px 28px;
      box-shadow: 0 0 0 1px #2c2c2c, 0 20px 60px rgba(0,0,0,.7);
      position: relative;
    }
    .device::after {
      content: 'kindle';
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 8px;
      letter-spacing: 0.2em;
      color: #333;
    }
    .screen {
      width: 210px;
      height: 284px;
      background: var(--paper);
      overflow: hidden;
      border-radius: 2px;
    }
    .screen img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .filter-row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      width: 100%;
      padding-bottom: 4px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      flex-shrink: 0;
      user-select: none;
    }
    .filter-item canvas {
      border-radius: 3px;
      border: 2px solid transparent;
      transition: border-color 0.12s;
      display: block;
    }
    .filter-item.sel canvas { border-color: var(--accent); }
    .filter-item span {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .filter-item.sel span { color: var(--accent); }

    .btn-row   { display: flex; gap: 10px; }
    .ghost-row { display: flex; gap: 16px; }

    button {
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      border: none;
      padding: 11px 22px;
      letter-spacing: 0.02em;
    }
    .primary   { background: var(--text); color: var(--bg); }
    .secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .ghost     { background: none; border: none; font-size: 12px; color: var(--muted); padding: 4px 0; font-weight: 400; }
    .ghost:hover { color: var(--text); }

    canvas, input[type=file] { display: none; }
  </style>
</head>
<body>

<header>Kindle Wallpaper</header>

<div id="sec-drop" class="section active">
  <div class="tabs">
    <button class="tab active" data-mode="auto">Auto Fit</button>
    <button class="tab" data-mode="manual">Manual Crop</button>
  </div>
  <div id="dropzone">
    <p>Drop an image<br>or tap to choose</p>
    <code>1072 × 1448 · grayscale</code>
  </div>
</div>

<div id="sec-crop" class="section">
  <p class="hint">Drag to move · Pinch to zoom</p>
  <div class="crop-wrap">
    <img id="crop-img" alt="">
  </div>
  <div class="btn-row">
    <button class="secondary" id="btn-back-crop">← Back</button>
    <button class="primary"   id="btn-confirm-crop">Use this crop</button>
  </div>
</div>

<div id="sec-filter" class="section">
  <div class="device">
    <div class="screen">
      <img id="preview-img" alt="">
    </div>
  </div>
  <div id="filter-row" class="filter-row"></div>
  <div class="btn-row">
    <button class="primary"   id="btn-send">Send to Kindle</button>
    <button class="secondary" id="btn-dl">Download</button>
  </div>
  <div class="ghost-row">
    <button class="ghost" id="btn-recrop" style="display:none">← Re-crop</button>
    <button class="ghost" id="btn-reset">Different image</button>
  </div>
</div>

<canvas id="work-canvas"></canvas>
<input type="file" id="file-input" accept="image/*">

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
<script>
/* ── Constants ── */
const W = 1072, H = 1448;
const PENDING_CACHE = 'kw-pending-v1';
const THUMB_W = 36, THUMB_H = 49;

/* ── Screen filter: sigmoid LUT (k=8)
 *
 * Analysis of original Amazon Kindle screensaver photography (Bruce Ashley, 2011):
 * These images were shot specifically for 16-greylevel e-ink. Their histogram is
 * bimodal — 27% of inputs map to near-black (0–30), 27% to near-white (225–255),
 * with only ~10% in true mid-grey. A logistic sigmoid with k=8 reproduces this.
 *
 * The "Screen" filter mimics this using three passes:
 *   1. Clarity (large-radius unsharp, 20px) — boosts texture-level local contrast
 *      on the greyscale image BEFORE the tone curve, making bark/grass/stone
 *      readable on e-ink's limited grey steps.
 *   2. Sigmoid tone curve — creates the bimodal distribution (darks → black,
 *      lights → white, steep mid-transition).
 *   3. Fine unsharp mask (1.5px) — crisps edges after the curve.
 */
const SCREEN_LUT = (() => {
  const lut = new Uint8Array(256);
  const k = 8, mid = 0.5;
  const lo  = 1 / (1 + Math.exp(-k * (0   - mid)));
  const hi  = 1 / (1 + Math.exp(-k * (1   - mid)));
  const rng = hi - lo;
  for (let i = 0; i < 256; i++) {
    const x = i / 255;
    const s = 1 / (1 + Math.exp(-k * (x - mid)));
    lut[i] = Math.round(((s - lo) / rng) * 255);
  }
  return lut;
})();

/* ── Filters ──
 *
 * Standard filters: { id, label, fn(r,g,b)→0–255 }
 *   fn converts colour to final greyscale value in one step.
 *
 * Screen filter uses a two-stage approach:
 *   toGrey(r,g,b)→0–255  — greyscale only, no tone curve
 *   clarity: { radius, amount }  — large-radius unsharp BEFORE curve
 *   lut: Uint8Array  — tone curve applied after clarity
 *   unsharp / unsharpAmount  — fine sharpening AFTER curve
 *
 * Thumbnails: toGrey + lut applied inline (clarity skipped at thumb size).
 */
const FILTERS = [
  {
    id: 'natural', label: 'Natural',
    fn: (r, g, b) => 0.2126*r + 0.7152*g + 0.0722*b
  },
  {
    id: 'vivid', label: 'Vivid',
    // S-curve: darkens shadows, brightens highlights
    fn: (r, g, b) => {
      const v = (0.2126*r + 0.7152*g + 0.0722*b) / 255;
      const s = v < 0.5 ? 2*v*v : 1 - 2*(1-v)*(1-v);
      return s * 255;
    }
  },
  {
    id: 'deep', label: 'Deep',
    // Clips shadows below 25, stretches remainder — deep blacks
    fn: (r, g, b) => Math.max(0, Math.min(255,
      (0.2126*r + 0.7152*g + 0.0722*b - 25) * (255 / 210)
    ))
  },
  {
    id: 'bright', label: 'Bright',
    // Gamma < 1 lifts shadows without blowing highlights
    fn: (r, g, b) => Math.pow((0.2126*r + 0.7152*g + 0.0722*b) / 255, 0.65) * 255
  },
  {
    id: 'portrait', label: 'Portrait',
    // Green-heavy + compressed range → smooth, flattering skin tones
    fn: (r, g, b) => 20 + (0.15*r + 0.72*g + 0.13*b) / 255 * 215
  },
  {
    id: 'landscape', label: 'Landscape',
    // Red-heavy (infrared-ish) → dark skies, bright warm areas
    fn: (r, g, b) => Math.max(0, Math.min(255,
      (0.55*r + 0.33*g + 0.12*b - 10) * (255 / 230)
    ))
  },
  {
    id: 'kindle', label: 'Kindle', unsharp: true, unsharpAmount: 0.8,
    // Strong S-curve + level stretch + edge sharpening — e-ink optimised
    fn: (r, g, b) => {
      const v    = (0.2126*r + 0.7152*g + 0.0722*b) / 255;
      const base = v < 0.5 ? 2*v*v : 1 - 2*(1-v)*(1-v);
      const s    = Math.max(0, Math.min(1, v + 1.5*(base - v)));
      return Math.max(0, Math.min(255, (s*255 - 15) * (255/225)));
    }
  },
  {
    id: 'screen', label: 'Screen',
    // Mimics original Amazon Kindle screensaver photography:
    //   clarity (20px) → sigmoid curve → fine sharpen
    toGrey:        (r, g, b) => 0.2126*r + 0.7152*g + 0.0722*b,
    lut:           SCREEN_LUT,
    clarity:       { radius: '20px', amount: 0.5 },
    unsharp:       true,
    unsharpAmount: 0.5,
  }
];

/* ── State ── */
let mode = 'auto';
let cropper = null;
let cropBlobUrl = null;
let originalBlob = null;
let sourceCanvas = null;
let outputBlob = null;
let previewUrl = null;
let currentFilter = FILTERS[0].id;

/* ── Elements ── */
const $ = id => document.getElementById(id);
const workCanvas = $('work-canvas');
const workCtx    = workCanvas.getContext('2d');
const dropzone   = $('dropzone');
const fileInput  = $('file-input');
const cropImg    = $('crop-img');
const filterRow  = $('filter-row');
const previewImg = $('preview-img');

workCanvas.width = W; workCanvas.height = H;

/* ── Section switching ── */
function show(name) {
  document.querySelectorAll('.section').forEach(s =>
    s.classList.toggle('active', s.id === `sec-${name}`)
  );
}

/* ── Mode tabs ── */
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
  });
});

/* ── Service worker ── */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(console.error);
}

/* ── Shared image ── */
window.addEventListener('load', async () => {
  if (new URLSearchParams(location.search).get('shared') !== '1') return;
  history.replaceState(null, '', location.pathname);
  try {
    await navigator.serviceWorker.ready;
    const cache = await caches.open(PENDING_CACHE);
    const res = await cache.match('/pending-image');
    if (!res) return;
    const blob = await res.blob();
    await cache.delete('/pending-image');
    handleBlob(blob);
  } catch (e) { console.error(e); }
});

/* ── Drop zone ── */
dropzone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleBlob(e.target.files[0]); });
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f?.type.startsWith('image/')) handleBlob(f);
});

/* ── Image entry ── */
function handleBlob(blob) {
  originalBlob = blob;
  if (mode === 'manual') { showCropUI(blob); return; }
  const img = new Image();
  const url = URL.createObjectURL(blob);
  img.onload = () => { URL.revokeObjectURL(url); autoFit(img); };
  img.onerror = () => URL.revokeObjectURL(url);
  img.src = url;
}

/* ── Auto fit ── */
function autoFit(img) {
  sourceCanvas = document.createElement('canvas');
  sourceCanvas.width = W; sourceCanvas.height = H;
  const ctx = sourceCanvas.getContext('2d');
  const scale = Math.max(W / img.width, H / img.height);
  const w = img.width * scale, h = img.height * scale;
  ctx.drawImage(img, (W-w)/2, (H-h)/2, w, h);
  setupFilters();
}

/* ── Manual crop ── */
function showCropUI(blob) {
  if (cropper) { cropper.destroy(); cropper = null; }
  if (cropBlobUrl) URL.revokeObjectURL(cropBlobUrl);
  cropBlobUrl = URL.createObjectURL(blob);
  show('crop');
  setTimeout(() => {
    cropImg.onload = () => {
      cropper = new Cropper(cropImg, {
        aspectRatio: W / H,
        viewMode: 1,
        autoCropArea: 0.9,
        guides: false,
        center: false,
        highlight: false,
        background: false,
        movable: true,
        zoomable: true,
        responsive: true,
        restore: false,
        toggleDragModeOnDblclick: false,
      });
    };
    cropImg.src = cropBlobUrl;
  }, 30);
}

$('btn-back-crop').addEventListener('click', () => {
  if (cropper) { cropper.destroy(); cropper = null; }
  if (cropBlobUrl) { URL.revokeObjectURL(cropBlobUrl); cropBlobUrl = null; }
  cropImg.src = '';
  show('drop');
});

$('btn-confirm-crop').addEventListener('click', () => {
  if (!cropper) return;
  const cropped = cropper.getCroppedCanvas({ width: W, height: H, imageSmoothingQuality: 'high' });
  sourceCanvas = document.createElement('canvas');
  sourceCanvas.width = W; sourceCanvas.height = H;
  sourceCanvas.getContext('2d').drawImage(cropped, 0, 0);
  cropper.destroy(); cropper = null;
  if (cropBlobUrl) { URL.revokeObjectURL(cropBlobUrl); cropBlobUrl = null; }
  cropImg.src = '';
  setupFilters();
});

/* ── Filter section ── */
function setupFilters() {
  currentFilter = FILTERS[0].id;
  buildThumbnails();
  show('filter');
  $('btn-recrop').style.display = mode === 'manual' ? '' : 'none';
  applyFilter();
}

function buildThumbnails() {
  const tc = document.createElement('canvas');
  tc.width = THUMB_W; tc.height = THUMB_H;
  tc.getContext('2d').drawImage(sourceCanvas, 0, 0, THUMB_W, THUMB_H);
  const td = tc.getContext('2d').getImageData(0, 0, THUMB_W, THUMB_H);

  filterRow.innerHTML = '';
  FILTERS.forEach(filter => {
    const thumb = document.createElement('canvas');
    thumb.width = THUMB_W; thumb.height = THUMB_H;
    const tCtx   = thumb.getContext('2d');
    const result = tCtx.createImageData(THUMB_W, THUMB_H);
    const greyFn = filter.toGrey || filter.fn;

    for (let i = 0; i < td.data.length; i += 4) {
      let v = Math.max(0, Math.min(255, Math.round(greyFn(td.data[i], td.data[i+1], td.data[i+2]))));
      if (filter.lut) v = filter.lut[v]; // apply tone curve for thumbnail preview
      result.data[i] = result.data[i+1] = result.data[i+2] = v;
      result.data[i+3] = 255;
    }
    tCtx.putImageData(result, 0, 0);

    const item  = document.createElement('div');
    const label = document.createElement('span');
    item.className = 'filter-item' + (filter.id === currentFilter ? ' sel' : '');
    item.dataset.filter = filter.id;
    label.textContent = filter.label;
    item.append(thumb, label);
    item.addEventListener('click', () => {
      filterRow.querySelectorAll('.filter-item').forEach(i => i.classList.remove('sel'));
      item.classList.add('sel');
      currentFilter = filter.id;
      applyFilter();
    });
    filterRow.append(item);
  });
}

/* ── Apply filter ──
 *
 * Standard filter:  fn() → putImageData → [unsharp]
 * Screen filter:    toGrey() → putImageData → clarity → lut → unsharp
 */
function applyFilter() {
  if (!sourceCanvas) return;
  const filter = FILTERS.find(f => f.id === currentFilter);
  const src    = sourceCanvas.getContext('2d').getImageData(0, 0, W, H);
  const out    = workCtx.createImageData(W, H);
  const greyFn = filter.toGrey || filter.fn;

  // Step 1: Greyscale conversion
  for (let i = 0; i < src.data.length; i += 4) {
    const v = Math.max(0, Math.min(255, Math.round(greyFn(src.data[i], src.data[i+1], src.data[i+2]))));
    out.data[i] = out.data[i+1] = out.data[i+2] = v;
    out.data[i+3] = 255;
  }
  workCtx.putImageData(out, 0, 0);

  const finish = () => {
    workCanvas.toBlob(blob => {
      outputBlob = blob;
      if (previewUrl) URL.revokeObjectURL(previewUrl);
      previewUrl = URL.createObjectURL(blob);
      previewImg.src = previewUrl;
    }, 'image/png');
  };

  const steps = [];

  // Step 2: Clarity (large-radius, pre-curve texture enhancement)
  if (filter.clarity) {
    steps.push(() => unsharpMask(workCanvas, filter.clarity.amount, filter.clarity.radius));
  }

  // Step 3: Tone curve LUT
  if (filter.lut) {
    steps.push(() => {
      const d = workCtx.getImageData(0, 0, W, H);
      for (let i = 0; i < d.data.length; i += 4) {
        const v = filter.lut[d.data[i]];
        d.data[i] = d.data[i+1] = d.data[i+2] = v;
      }
      workCtx.putImageData(d, 0, 0);
    });
  }

  // Step 4: Fine sharpening
  if (filter.unsharp) {
    steps.push(() => unsharpMask(workCanvas, filter.unsharpAmount || 0.8, '1.5px'));
  }

  // Run steps in sequence, then finish
  steps.reduce((p, fn) => p.then(fn), Promise.resolve()).then(finish);
}

/* ── Unsharp mask — GPU blur (CSS filter) + per-pixel subtract ──
 * radius: CSS blur value, e.g. '1.5px' (fine sharpen) or '20px' (clarity)
 */
async function unsharpMask(canvas, amount, radius = '1.5px') {
  const { width: w, height: h } = canvas;
  const ctx   = canvas.getContext('2d');
  const blurC = document.createElement('canvas');
  blurC.width = w; blurC.height = h;
  const bCtx  = blurC.getContext('2d');
  bCtx.filter = `blur(${radius})`;
  bCtx.drawImage(canvas, 0, 0);
  const orig    = ctx.getImageData(0, 0, w, h);
  const blurred = bCtx.getImageData(0, 0, w, h);
  for (let i = 0; i < orig.data.length; i += 4) {
    const v = Math.max(0, Math.min(255, orig.data[i] + amount * (orig.data[i] - blurred.data[i])));
    orig.data[i] = orig.data[i+1] = orig.data[i+2] = Math.round(v);
  }
  ctx.putImageData(orig, 0, 0);
}

/* ── Send to Kindle ── */
$('btn-send').addEventListener('click', async () => {
  if (!outputBlob) return;
  const file = new File([outputBlob], 'kindle-wallpaper.png', { type: 'image/png' });
  if (navigator.canShare?.({ files: [file] })) {
    try { await navigator.share({ files: [file], title: 'Kindle Wallpaper' }); return; }
    catch (e) { if (e.name === 'AbortError') return; }
  }
  download();
});

$('btn-dl').addEventListener('click', download);
function download() {
  if (!outputBlob) return;
  Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(outputBlob),
    download: 'kindle-wallpaper.png'
  }).click();
}

$('btn-recrop').addEventListener('click', () => { if (originalBlob) showCropUI(originalBlob); });

$('btn-reset').addEventListener('click', () => {
  sourceCanvas = null; outputBlob = null; originalBlob = null;
  if (previewUrl) { URL.revokeObjectURL(previewUrl); previewUrl = null; }
  fileInput.value = '';
  currentFilter = FILTERS[0].id;
  show('drop');
});
</script>
</body>
</html>
